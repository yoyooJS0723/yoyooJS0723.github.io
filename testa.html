<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時連線動作同步演示</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f2f5; }
        .box { width: 100px; height: 100px; background-color: #3498db; margin: 20px auto; border-radius: 10px; transition: all 0.2s; }
        .active { background-color: #e74c3c; transform: scale(1.2); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; border: none; background: #2ecc71; color: white; }
        button:hover { background: #27ae60; }
        p { color: #666; }
    </style>
    <!-- 【已修正】引入完整的 PieSocket 套件庫路徑，不再只是空網址 -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <h1>多人即時同步測試</h1>
    <p>請用瀏覽器同時打開「兩個視窗」，點擊按鈕看看另一個視窗的變化！</p>
    
    <div id="statusBox" class="box"></div>
    <button onclick="sendAction()">戳一下方塊！</button>

    <script>
        // 初始化連線
        const pieSocket = new PieSocket.default({
            clusterId: "demo",
            apiKey: "o7wYTkfkYpTL6K6Yr4Vw9fS8N7A6f2g1"
        });

        const channel = pieSocket.subscribe("game-room");

        // 監聽即時訊號
        channel.on("action-triggered", (data) => {
            const box = document.getElementById("statusBox");
            box.classList.add("active");
            setTimeout(() => {
                box.classList.remove("active");
            }, 1000);
        });

        // 發送即時訊號
        function sendAction() {
            channel.publish("action-triggered", {
                message: "有人點擊了按鈕！"
            });
        }
    </script>
</body>
</html>
