<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>最簡即時同步</title>
    <!-- 引入 PieSocket 庫 -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <p id="targetText">等待變更...</p>
    <button onclick="changeText()">改變文字</button>

    <script>
        // 1. 初始化連線
        const pieSocket = new PieSocket.default({
            clusterId: "demo",
            apiKey: "o7wYTkfkYpTL6K6Yr4Vw9fS8N7A6f2g1"
        });

        // 2. 訂閱房間
        const channel = pieSocket.subscribe("text-room");

        // 3. 監聽：別人點擊時，自己畫面即時跟著變
        channel.on("text-changed", (data) => {
            document.getElementById("targetText").innerText = data.text;
        });

        // 4. 發送：自己點擊時，通知所有人改變
        function changeText() {
            channel.publish("text-changed", {
                text: "文字已被即時改變！"
            });
        }
    </script>
</body>
</html>
