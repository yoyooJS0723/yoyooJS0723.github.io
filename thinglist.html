<script>
// 事項總列表
const List = {}

document.getElementById("open").addEventListener("click",function(){
    const guiA = document.getElementById('guiA');
        if (guiA.style.display == 'none'){
            guiA.style.display = 'flex';

        else{

})
// 關閉新增介面
document.getElementById("add_close").addEventListener("click",function(){

        guiA.style.display = 'none';

// 完成新增介面
document.getElementById("add_finsh").addEventListener("click", function(){
    const title_e = document.getElementById('add_title').value;
    const text = document.getElementById('add_text').value;
    const t_start = document.getElementById('add_t_start').value;
    const t_end = document.getElementById('add_t_end').value;
    const t_prepare = document.getElementById('add_t_prepare').value;
    
    const tag = document.getElementById('add_tag');

})
// 創立新list
let t = 0;
let BGH = 100;
document.getElementById("adda").addEventListener("click", function () {
        const NewThing = document.createElement("div");
        NewThing.style.margin = 'auto';
        NewThing.style.width = '70vw';
        NewThing.style.borderRadius = '20px';
        NewThing.style.backgroundColor = '#ffffff';
        const text = document.createElement("h1");
        text.textContent = `這是標題${t}`
        t = t + 1;
        text.style.textAlign = 'center'
        NewThing.appendChild(text);

});
let tag_ts = 0;
const add_tag = document.getElementById("add_tag");
add_tag.addEventListener("click",function(){
    tag_ts += 1;
    const new_tag = document.createElement("div");
    new_tag.className = "tag_div";
    const new_tag_input = document.createElement("input")
    new_tag_input.className = "tag_input";
    new_tag_input.id = `add_tag{tag_ts}`;
    new_tag_input.type = "text"
    new_tag_input.placeholder = " 標籤"
    new_tag.appendChild(new_tag_input);
    new_tag.appendChild(add_tag);
    const tag_container = document.getElementById("tag_container");
    tag_container.appendChild(new_tag);
})
</script>
